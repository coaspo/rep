<html>
<head>
<script>
  function weather() {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(localWeather);
    } else {
      const boston_loc = 'lat=42.3587&lon=-71.0567'
      window.location.href = 'https://forecast.weather.gov/MapClick.php?' + boston_loc + '&unit=0&lg=english&FcstType=graphical', true;
    }
  }

  function localWeather(position) {
    window.location.href = 'https://forecast.weather.gov/MapClick.php?lat='+position.coords.latitude +'&lon='+position.coords.longitude + '&unit=0&lg=english&FcstType=graphical', true; 
  }
  
  weather()
</script>
</head>
</html>
