   <body style="font-size:24px;"><pre>
<b>prasorizo (leek rice)</b>
2 tbsp olive oil
1 onion 
3-6 cloves of garlic
2 leeks
   5 min saute, until soft
   
1.5 cups rice
   3 min sauteed

6 1/3 cups water/broth
1 tsp salt
1     pepper
1     oregano
6 tbsp fresh parsley

   cook/stir for ~20 min
