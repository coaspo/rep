   <body><table>
<tr><th><i>Potato Tortilla</i><br>Spanish omelet</th>
<tr><td><pre>1.5 lb potatoes
1 cup olive oil
    half fry - 7 min.
    strain extra oil

1 onion thin sliced
6 eggs
2 tbsp broth
    fry in 2 tbsp oil
    add potatoes on top
    stir, simmer 8 min
    flip, cook 4 min.

Alternative:
pepper sauteed 
   375 °F, 15 min</pre>
