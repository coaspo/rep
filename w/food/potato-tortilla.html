      <title>potato tortilla</title>

   <body style="font-size:24px;"><pre>
1.5 lb potatoes
1 cup olive oil
	stir fry half cooked - 7 minutes
	strain extra oil
1 onion thin sliced
6 eggs
2 tbsp broth
	fry in in 2 tbsp oil
	add potatoes on top
	stir, simmer 8 min
	flip & cook for 4 min.

May add peppers, 
or bake 375 F, 15,15 min
