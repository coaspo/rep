<html>
<head>
    <title>Night sky</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

.parent {
  position: absolute;
  top: 0;
  left: 295;
}
.cntrl {
  position: absolute;
  top: 0;
  left: 10;
}
.parent2 {
  position: absolute;
  top: 530;
  left: 5;
}
.image1 {
  position: relative;
  top: 10;
  left: 10;
  border-radius: 50%;
}
.bottom-right {
  position: absolute;
  top: 480;
  left: 420;
}
.bottom-left {
  position: absolute;
  top: 480;
  left: 25;
}
button {
  transition: 0.3s;
  font-size: 18px;
  width:115px;
  text-align: center;
  margin:-5;
}
.backCanvas{ 
    position:absolute; top:0px; left:0px;
    background-color: rgba(0,0,0,0);
}
</style>
</head>

<body>
<div class="parent" >  
  <img class="image1" src="./sky-stars.jpg" id="stars" onclick="nextHour();" />
  <canvas class="backCanvas" id="backgrd" width="525" height="525"></canvas>
</div>

<div class="cntrl" >  
  <br><pre style="font-size: 18px;"> <span style="color:blue;  width: 1550px; font-size: 16px;" id="date"></span>

  <span id="sunrise"  style="font-size: 18px;"></span>   <span id="sunset"  style="font-size: 18px;"></span>          


  Month  <button onmousedown="startWorker('month',1);" onmouseup="stopWorker();" style="width:40px;">+</button>   <button onmousedown="startWorker('month',-1);" onmouseup="stopWorker();" style="width:40px;">-</button> 

  Day    <button onmousedown="startWorker('day',1);" onmouseup="stopWorker();" style="width:40px;">+</button>   <button onmousedown="startWorker('day',-1);" onmouseup="stopWorker();" style="width:40px;">-</button>  

  Hour   <button onmousedown="startWorker('hour',1);" onmouseup="stopWorker();" style="width:40px;">+</button>   <button onmousedown="startWorker('hour',-1);" onmouseup="stopWorker();" style="width:40px;">-</button>


  
  <a href="https://skyandtelescope.org/interactive-sky-chart/">sky and telescope</a>
  
  <a href="https://www.darkskymap.com/">dark sky</a>

<div class="parent2" >  
  <img class="image2" src="./sky-stars-equator.jpg" id="stars" onclick="nextHour();" />
  <br><pre> <span id="sunrise"  style="font-size: 18px;"></span>
 </div>
</body>

<script>
   var w
   class Earth {
     static LATIDUDE = 42.5* Math.PI / 180
   }
   class Sun {
     constructor(date) {
       this.hourAngle = Sun.hourAngle(date);
       this.declination = Sun.declination(date);
       this.setSunsetSunrise(Earth.LATIDUDE)
     }
     static hourAngle(date) {
        const hours = date.getHours()
        const angle = (hours - 44/60) / 24. * 360
        return angle
     }
     static declination(date) {
       const jan1Date = new Date((date.getFullYear(), 0, 1, 0, 0, 0, 0))
       const days = (date - jan1Date) / 1000/60/60/24
       // https://en.wikipedia.org/wiki/Position_of_the_Sun
       const declination = -Math.asin(0.39779*Math.cos(0.98565 *Math.PI/180. *(days+10)+
                           1.914 *Math.PI/180.* Math.sin(0.98565 *Math.PI/180.*(days-2))))
       console.log('d='+(declination*180/Math.PI))
       return declination
     }
     setSunsetSunrise(latitude) {
       const sin_a = Math.sin(-.83 *Math.PI/180)
       const sin_f = Math.sin(latitude)
       const cos_f = Math.cos(latitude)
       const sin_d = Math.sin(this.declination)
       const cos_d = Math.cos(this.declination)
       const hourAngle = Math.acos((sin_a - sin_f * sin_d) / cos_f / cos_d ) * 180 / Math.PI
       const sunriseHour = 12.5 - hourAngle/15
       const sunsetHour = 12.5 + hourAngle/15
       const hours = date.getHours() + date.getMinutes() / 60
       this.isDown = hours< sunriseHour || hours > sunsetHour 
       console.log(this.sunriseTime)
       console.log(this.sunsetTime)
       this.sunriseTime = Sun.hourMin(sunriseHour)
       this.sunsetTime = Sun.hourMin(sunsetHour)
       console.log(this.sunriseTime)
       console.log(this.sunsetTime)
     }
     static hourMin(decimalTime) {
       const hour = Math.trunc(decimalTime)
       const hh = hour < 13 ? hour : hour - 12
       const minute = Math.trunc((decimalTime - hour) * 60)
       const mm = minute < 10 ? '0'+minute : minute
       return hh + ':' + mm
     }
   }
   class NorthSky {
     static EQUATOR_RADIUS = 229 // for Betelgeuse  R*cos(7.25 deg)=227 pixels
     static drawZenith(sun) {
       var ctx = NorthSky.getContext()
       
       ctx.beginPath();
       // clockwise polygon covers image
       var c = document.getElementById("backgrd");
       ctx.moveTo(0, 0);
       ctx.lineTo(c.height, 0);
       ctx.lineTo(c.height, c.width);
       ctx.lineTo(0, c.width);
       ctx.closePath();
       // hole to image is clockwise when sun is down
       ctx.ellipse(261, 332, 214, 180, 0, 0, 2 * Math.PI, sun.isDown);
       const backColor = sun.isDown ? 'black' : 'blue'
       ctx.fillStyle = backColor;
       ctx.globalAlpha = sun.isDown ? .2 : .1
       ctx.strokeStyle = "rgba(0.1,0.5,0.5,0)";
       ctx.lineWidth = 1;
       ctx.fill();
       ctx.globalAlpha = 1
      
       const y =  262 + NorthSky.EQUATOR_RADIUS * Math.sin(Earth.LATIDUDE)
       ctx.font = "20px Arial";
       ctx.fillText("Z", 262, y); 
       ctx.fillText("N", 262, 172); 
       ctx.fillText("S", 262, 502); 
       ctx.fillText("E", 54, 350); 
       ctx.fillText("W", 449, 350); 
     }
     static update(date, sun) {
       NorthSky.clearCanvas()
       NorthSky.rotate(date)
       const sunRadius = NorthSky.EQUATOR_RADIUS * Math.cos(Earth.LATIDUDE+sun.declination)
       updateSunriseSunset(sun) 
       NorthSky.drawDisc (sun.hourAngle, sunRadius)
       NorthSky.drawZenith(sun)
     }
     static rotate(date) {
       const angle = NorthSky.daysAngle(date) + Sun.hourAngle(date)
       var stars_img = document.getElementById('stars')
       stars_img.style.transform = 'rotate(-'+angle+'deg)'
       document.getElementById('date').innerHTML = NorthSky.dateAmPm(date)
     }
     static dateAmPm(date) {
       let ts = date.toString().substr(0,16)
       let hours = date.getHours()
       let minutes = date.getMinutes()
       const ampm = hours >= 12 ? 'PM' : 'AM'
       hours = hours % 12
       hours = hours ? hours : 12 // the hour '0' should be '12'
       minutes = minutes < 10 ? '0'+minutes : minutes
       ts += ' '+hours + ':' + minutes + ' ' + ampm
       return ts
     }
     static daysAngle(date) {
        const year = date.getFullYear()
        const spring_equinox_date = new Date(year, 2, 21, 0, 0, 0, 0)
        const days = (date - spring_equinox_date) / 1000/60/60/24
        const angle = (days / 365.) * 360.
        return angle
     }
     static clearCanvas() {
       var c = document.getElementById("backgrd");
       var ctx = c.getContext("2d")
       ctx.clearRect(0, 0, c.width, c.height)
     }
     static getContext() {
       var c = document.getElementById("backgrd");
       var ctx = c.getContext("2d")
       ctx.beginPath()
       return ctx
     }
     static drawDisc (angle, pixelRadius) {
       var ctx = NorthSky.getContext()
       
       const a = (180 + angle) * Math.PI/180.
       const x = 262+ Math.round(pixelRadius * Math.sin (a))
       const y = 262+ Math.round(pixelRadius * Math.cos (a))
       ctx.fillStyle = 'red'
       ctx.strokeStyle = 'black';
       ctx.lineWidth = 10;
       ctx.arc(x, y, 5, 0, 2 * Math.PI, 1)
       ctx.fill() 
   }

   }
   date = new Date()
   sun  = new Sun(date)
   NorthSky.update(date, sun);
//---------------------------------------------------------------------------
function startWorker(type, increment) {
  if (type == 'month') {
    f = nextMonth
    timeout= 800
  } else if (type == 'day') {
    f = nextDay
    timeout= 200
  } else if (type == 'hour') {
    f = nextHour
    timeout= 500
  }
  if(typeof(Worker) !== "undefined") {
    if(typeof(w) == "undefined") {
      w = new Worker("worker.js");
    }
    w.onmessage = function(event) {
      f(increment)
    };
    w.postMessage({'timeout': timeout});
  } else {
    document.getElementById("result").innerHTML = "Sorry, your browser does not support Web Workers...";
  }
}

function stopWorker() { 
  w.terminate();
  w = undefined;
}
//---------------------------------------------------------------------------
   function nextHour(increment) {
      date = new Date(date.getFullYear(), date.getMonth(), date.getDate(), date.getHours()+increment, 0, 0, 0)
      sun  = new Sun(date)
      NorthSky.update(date, sun) 
   }
   function nextDay(increment) {
      date = new Date(date.getFullYear(), date.getMonth(), date.getDate(), date.getHours()+increment*24, 0, 0, 0)
      sun  = new Sun(date)
      NorthSky.update(date, sun) 
   }
   function nextMonth(increment) {
      let year = date.getFullYear()
      let month = date.getMonth()
      month = month + increment
      if (month > 11) {
        year += 1
        month = 0
      } else if (month < 0) {
        year -= 1
        month = 11
      }
      date = new Date(year, month, date.getDate(), date.getHours(), 0, 0, 0)
      sun  = new Sun(date)
      NorthSky.update(date, sun) 
   }
   function updateSunriseSunset(sun) {
      if (sun.isDown) {
        backgroundColor='#8C8C8C'
        sunColor = 'black'
      } else {
        backgroundColor='#ECF9FF'
        sunColor = 'rgba(255,87,5,1)'
      }
     document.getElementById('sunrise').innerHTML = '🌅 '+ sun.sunriseTime
     document.getElementById('sunset').innerHTML = '🌇 '+ sun.sunsetTime
     return [sunColor, backgroundColor]
   }
   
</script>
</html>
