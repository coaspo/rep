    <script>
      function opencontName(evt, tabName) {
         var i;
         var x = document.getElementsByClassName("contName");
         for (i = 0; i < x.length; i++) {
            x[i].style.display = "none";
         }
         document.getElementById(tabName).style.display = "block";
         //
         tablinks = document.getElementsByClassName("tablink");
         for (i = 0; i < x.length; i++) {
            tablinks[i].className = tablinks[i].className.replace(" w3-blue", "yellow");
         }
         evt.currentTarget.className += " w3-blue";
       }
      function findAcronym() {
        var acronym = document.getElementById('inputText').value;
        var url = "https://www.acronymfinder.com/" + acronym + ".html";
        var win = window.open(url, "_self");
        win.focus();
      }
      function σταΕλληνικά() {
        var englishWord = document.getElementById('inputText').value;
        var url = "https://translate.google.com/#en/el/" + englishWord;
        var win = window.open(url, "_self");
        win.focus();
      }
      function defineWord() {
        var word = document.getElementById('inputText').value;
        var url = "https://www.dictionary.com/browse/" + word + "?s=t";
        var win = window.open(url, "_self");
        win.focus();
      }
      function wikipedia() {
        var word = document.getElementById('inputText').value;
        var url = "https://en.wikipedia.org/wiki/" + word;
        var win = window.open(url, "_self");
        win.focus();
      }
      function mayoclinic() {
        var word = document.getElementById('inputText').value;
        var url = "https://www.mayoclinic.org/search/search-results?q=" + word;
        var win = window.open(url, "_self");
        win.focus();
	    }
      function duckDuckGo() {
        var word = document.getElementById('inputText').value;
        var url = "https://duckduckgo.com/?q=" + word + "&t=hk&ia=web";
        var win = window.open(url, "_self");
        win.focus();
	    }
      function podCasts() {
        var word = document.getElementById('inputText').value;
        var url = "https://www.listennotes.com/search/?q=" + word + "&sort_by_date=0&scope=episode&offset=0&language=Any%20language&len_min=0";
        var win = window.open(url, "_self");
        win.focus();
	    }
	  if (document.URL.startsWith('file')) {
	    document.body.style.background = "lightyellow"
	  }
    document.getElementById('inputText').addEventListener('keypress', function (e) {
    var key = e.which || e.keyCode;
    if (key === 13) { // 13 is enter
      duckDuckGo() 
    }
});
